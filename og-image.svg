<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#242424;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A07830;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#E8C97A;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A07830;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- 테두리 -->
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-opacity="0.3" rx="8"/>

  <!-- 상단 골드 바 -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#goldGrad)"/>

  <!-- 상단 라벨 -->
  <text x="600" y="200" font-family="serif" font-size="22" fill="#C9A84C" text-anchor="middle" letter-spacing="8" opacity="0.8">GANGNAM · DALTO · KARAOKE</text>

  <!-- 구분선 상단 -->
  <line x1="200" y1="230" x2="1000" y2="230" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- 메인 타이틀 -->
  <text x="600" y="350" font-family="serif" font-size="88" font-weight="900" fill="url(#goldGrad)" text-anchor="middle">강남 달리는토끼 가라오케</text>

  <!-- 구분선 하단 -->
  <line x1="200" y1="400" x2="1000" y2="400" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- 서브 텍스트 -->
  <text x="600" y="460" font-family="sans-serif" font-size="26" fill="#888888" text-anchor="middle" letter-spacing="4">강남 하이퍼블릭 대표 업소 · 여직원 모집</text>

  <!-- 연락처 -->
  <text x="600" y="540" font-family="sans-serif" font-size="22" fill="#C9A84C" text-anchor="middle" opacity="0.7">카카오톡 team.henry · 010-2343-2434</text>
</svg>
