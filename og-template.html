<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #C9A84C 0%, #E8C97A 40%, #F5D878 60%, #C9A84C 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .glow-left {
    position: absolute;
    left: -60px; top: -60px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-right {
    position: absolute;
    right: -60px; bottom: -60px;
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(160,120,40,0.3) 0%, transparent 70%);
    pointer-events: none;
  }
  .border-frame {
    position: absolute;
    inset: 28px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 24px;
    pointer-events: none;
  }
  .content {
    text-align: center;
    z-index: 1;
    padding: 40px;
  }
  .rabbit {
    font-size: 64px;
    margin-bottom: 12px;
    line-height: 1;
  }
  .tag {
    display: inline-block;
    background: rgba(0,0,0,0.12);
    border: 1px solid rgba(0,0,0,0.2);
    color: #3a2800;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 6px 20px;
    border-radius: 999px;
    margin-bottom: 18px;
  }
  .title {
    font-size: 60px;
    font-weight: 900;
    color: #1a1000;
    line-height: 1.2;
    margin-bottom: 14px;
    letter-spacing: -1px;
    text-shadow: 0 2px 8px rgba(255,255,255,0.3);
  }
  .sub {
    font-size: 22px;
    color: rgba(40,25,0,0.65);
    font-weight: 600;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
  }
  .badges {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .badge {
    background: rgba(0,0,0,0.12);
    border: 1px solid rgba(0,0,0,0.15);
    color: #1a1000;
    font-size: 15px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 8px;
  }
  .domain {
    position: absolute;
    bottom: 48px;
    right: 60px;
    color: rgba(40,25,0,0.45);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glow-left"></div>
  <div class="glow-right"></div>
  <div class="border-frame"></div>
  <div class="content">
    <div class="rabbit">🐰</div>
    <div class="tag">GANGNAM · 강남 유흥 알바</div>
    <div class="title">달리는토끼 가라오케<br>여직원 모집</div>
    <div class="sub">하이퍼블릭 · 시급 10만원 · 당일 현금 지급</div>
    <div class="badges">
      <span class="badge">📞 010-2343-2434</span>
      <span class="badge">💬 team.henry</span>
      <span class="badge">24시간 문의 가능</span>
    </div>
  </div>
  <div class="domain">daltogirls.com</div>
</body>
</html>
