<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0e0c06 0%, #1a1505 40%, #221b06 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .glow-left {
    position: absolute;
    left: -100px; top: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(201,168,76,0.25) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-right {
    position: absolute;
    right: -80px; bottom: -80px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(201,168,76,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .border-frame {
    position: absolute;
    inset: 28px;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 24px;
    pointer-events: none;
  }
  .content {
    text-align: center;
    z-index: 1;
    padding: 40px;
  }
  .rabbit {
    font-size: 64px;
    margin-bottom: 16px;
    line-height: 1;
  }
  .tag {
    display: inline-block;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.4);
    color: #E8C97A;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 6px 20px;
    border-radius: 999px;
    margin-bottom: 22px;
  }
  .title {
    font-size: 58px;
    font-weight: 900;
    background: linear-gradient(90deg, #A07830, #F0D080, #C9A84C, #E8C97A, #A07830);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 16px;
    letter-spacing: -1px;
  }
  .sub {
    font-size: 22px;
    color: rgba(220,200,150,0.7);
    font-weight: 400;
    margin-bottom: 32px;
    letter-spacing: 1px;
  }
  .badges {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .badge {
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.3);
    color: #C9A84C;
    font-size: 15px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 8px;
  }
  .domain {
    position: absolute;
    bottom: 48px;
    right: 60px;
    color: rgba(201,168,76,0.4);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glow-left"></div>
  <div class="glow-right"></div>
  <div class="border-frame"></div>
  <div class="content">
    <div class="rabbit">🐰</div>
    <div class="tag">GANGNAM · 강남 유흥 알바</div>
    <div class="title">달리는토끼 가라오케<br>여직원 모집</div>
    <div class="sub">하이퍼블릭 · 시급 10만원 · 당일 현금 지급</div>
    <div class="badges">
      <span class="badge">📞 010-2343-2434</span>
      <span class="badge">💬 team.henry</span>
      <span class="badge">24시간 문의 가능</span>
    </div>
  </div>
  <div class="domain">daltogirls.com</div>
</body>
</html>
